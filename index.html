





<!DOCTYPE html>
<html lang="pt-BR">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="color-scheme" content="light only">
    <meta name="supported-color-schemes" content="light">
    <meta name="theme-color" content="#ffffff">

  
<title>dr Mecânico — Login</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<link rel="stylesheet" href="estilos.css">

<style>
  /* Intro */





/* Login começa escondido */

#wrap{
  opacity:0;
  visibility:hidden;
  transform:translateY(25px);
}

/* Logo aparece */








/* Campos aparecem */

#wrap.mostrar{
  animation:campos 0.8s forwards;
}





* { margin:0; padding:0; box-sizing:border-box; }
body { background:#3E4095 !important; display:flex; justify-content:center; min-height:100vh; font-family:Arial,Helvetica,sans-serif; }
.page-wrap { position:relative; width:100%; max-width:480px; }
.bg-svg { width:100%; display:block; }

/* Campos sobre o SVG */
.field-over {
  position:absolute;
  background:rgba(55,52,149,0.95) !important;
  border:1.5px solid rgba(255,255,255,0.35) !important;
  border-radius:40px;
  display:flex;
  align-items:center;
  padding:0 16px;
  z-index:10;
}
.field-over input {
  width:100%;
  background:transparent;
  border:none;
  outline:none;
  color:white !important;
  font-size:clamp(12px,3.5vw,15px);
  font-family:Arial,Helvetica,sans-serif;
}
.field-over:focus-within {
  background:rgba(0,0,30,0.5) !important;
}
.field-over input::placeholder { color:rgba(255,255,255,0.55) !important; }

/* Botões */
.btn-abs {
  position:absolute;
  border:none;
  border-radius:40px;
  cursor:pointer;
  font-family:Arial,Helvetica,sans-serif;
  font-weight:900;
  z-index:10;
  transition:all 0.15s;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
}
.btn-entrar { background:linear-gradient(135deg,#00AEEF,#0098DA); color:white !important; font-size:clamp(13px,3.5vw,16px); }
.btn-google { background:white !important; color:#333 !important; font-size:clamp(11px,3vw,14px); font-weight:700; }
.btn-google svg { width:16px; height:16px; flex-shrink:0; }
.btn-abs:hover { opacity:0.9; transform:translateY(-1px); }

/* Erro */
.login-err {
  position:absolute;
  background:rgba(220,50,50,0.9) !important;
  color:white !important;
  border-radius:12px;
  padding:8px 14px;
  font-size:clamp(10px,2.8vw,13px);
  text-align:center;
  z-index:20;
  display:none;
  width:80%;
}

/* Spinner */
.spin { display:inline-block; width:14px; height:14px; border:2px solid rgba(255,255,255,0.4); border-top-color:white !important; border-radius:50%; animation:sp .7s linear infinite; }
@keyframes sp { to { transform:rotate(360deg); } }

@keyframes campos{
  from{
    opacity:0;
    transform:translateY(25px);
  }

  to{
    opacity:1;
    transform:translateY(0);
  }
}
/* Voltar */
.btn-voltar {
  position:absolute;
  color:rgba(255,255,255,0.6) !important;
  font-size:clamp(10px,2.5vw,12px);
  cursor:pointer;
  z-index:10;
  background:none;
  border:none;
  font-family:Arial;
  text-decoration:underline;
}

.btn-nao-cliente {
  background: linear-gradient(135deg,#00AEEF,#0098DA);
  color: white !important;
  font-size: clamp(13px,3.5vw,16px);
}
/* Abraço lateral mais forte */
.card-stack .card + .card,
.info-card + .info-card,
.section-card + .section-card{
  margin-top: 0 !important;
}

@media (max-width:768px){
  .info-card,
  .section-card{
    position: relative;
  }

  .info-card:not(:first-child),
  .section-card:not(:first-child){
    margin-left: -10px;
    margin-right: -10px;
    width: calc(100% + 20px);
  }
}
.field-over,
.btn-abs{
  opacity:0;
}

</style>
</head>
<body>
 
 





<div class="page-wrap" id="wrap">
  <img src="images/login2.svg" class="bg-svg" id="bgsvg" alt="Login">
  

  <div class="login-err" id="lerr"></div>

  <div class="field-over" id="field-email">
    <input type="email" id="inp-email" placeholder="e-mail" onkeydown="if(event.key==='Enter')document.getElementById('inp-senha').focus()">
  </div>
  <div class="field-over" id="field-senha">
    <input type="password" id="inp-senha" placeholder="senha" onkeydown="if(event.key==='Enter')doLogin()">
  </div>

  <button class="btn-abs btn-entrar" id="btn-entrar" onclick="doLogin()">Entrar</button>
  <button class="btn-abs btn-google" id="btn-google" 
    data-client-id="425197317527-kt5c2j5lk56jqkk7klp188d5rra6gi0q.apps.googleusercontent.com"
    onclick="doGoogleLogin()">
    <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
    Continuar com Google
  </button>
 
<button
  class="btn-abs btn-nao-cliente"
  id="btn-nao-cliente"
  onclick="window.location.href='home.html'">
  Ainda não sou associado
</button>

</div>

<script>
var CLIENT_ID = '425197317527-kt5c2j5lk56jqkk7klp188d5rra6gi0q.apps.googleusercontent.com';

// ── Posicionamento preciso sobre o SVG ───────────────────

 function ajustar() {
  var img = document.getElementById('bgsvg');
  var iw = img.offsetWidth, ih = img.offsetHeight;

  if(!iw || !ih) {
    setTimeout(ajustar, 100);
    return;
  }

  var VW = 1598, VH = 2840;
  var sx = iw/VW, sy = ih/VH;




  

 pos(document.getElementById('btn-google'), 133, 2259, 1333, 190);
pos(document.getElementById('btn-nao-cliente'), 133, 2479, 1333, 190);
  function pos(el, x, y, w, h) {
    el.style.left   = (x*sx)+'px'; el.style.top    = (y*sy)+'px';
    el.style.width  = (w*sx)+'px'; el.style.height = (h*sy)+'px';
  }

  // Campos: x=133, y=2014, w=638, h=209 (login) | x=828 (senha)
  pos(document.getElementById('field-email'), 133, 1800, 638, 209);
  pos(document.getElementById('field-senha'), 828, 1800, 638, 209);

  // Botão Entrar: abaixo dos campos
 pos(document.getElementById('btn-entrar'), 133, 2039, 1333, 190);
 

  // Erro
  var err = document.getElementById('lerr');
  err.style.top  = (ih*0.67)+'px';
  err.style.left = (iw*0.1)+'px';
 }
var bgsvg = document.getElementById('bgsvg');
bgsvg.addEventListener('load', ajustar);
window.addEventListener('resize', ajustar);
window.addEventListener('load', ajustar);
setTimeout(ajustar, 200);
if(bgsvg.complete) ajustar();

// ── Helpers ───────────────────────────────────────────────
function showErr(msg) {
  var el = document.getElementById('lerr');
  el.textContent = msg; el.style.display = msg ? 'block' : 'none';
  if(msg) setTimeout(function(){ el.style.display='none'; }, 5000);
}

function setBusy(id, busy, label) {
  var btn = document.getElementById(id);
  btn.disabled = busy;
  btn.innerHTML = busy ? '<span class="spin"></span> Aguarde...' : label;
}

// ── Login e-mail/senha ────────────────────────────────────
async function doLogin() {
  var email = document.getElementById('inp-email').value.trim();
  var senha = document.getElementById('inp-senha').value;
  if(!email || !senha) { showErr('Preencha e-mail e senha.'); return; }

  setBusy('btn-entrar', true);
  try {
    var r = await fetch('https://drmecanico-backend-2.onrender.com/api/auth/login', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({email:email, password:senha})
    });
    var text = await r.text();
    var data = {};
    try { data = JSON.parse(text); } catch(e) {}

    if(!r.ok) { showErr(data.error || 'E-mail ou senha incorretos.'); return; }
    localStorage.setItem('drm_token', data.token);
    localStorage.setItem('drm_user', JSON.stringify(data.user));
    window.location.replace('/cliente.html');
  } catch(e) {
    showErr('Erro de conexão. Tente novamente.');
  } finally {
    setBusy('btn-entrar', false, 'Entrar');
  }
}

// ── Google Login ──────────────────────────────────────────
function abrirPopupGoogle() {
  var old = document.getElementById('g-wrap');
  if(old) old.remove();
  var wrap = document.createElement('div');
  wrap.id = 'g-wrap';
  wrap.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:9999;display:flex;align-items:center;justify-content:center';
  wrap.innerHTML = '<div style="background:white;border-radius:16px;padding:24px;text-align:center;min-width:280px"><p style="font-weight:900;color:#3E4095;margin-bottom:16px;font-size:16px">Entrar com Google</p><div id="g-btn-inner"></div><br><button onclick="document.getElementById(\'g-wrap\').remove()" style="width:100%;padding:10px;border:none;background:#f0f0f0;border-radius:8px;cursor:pointer;font-family:Arial;font-size:14px">Cancelar</button></div>';
  document.body.appendChild(wrap);
  google.accounts.id.renderButton(document.getElementById('g-btn-inner'),{theme:'outline',size:'large',width:'240',text:'continue_with',locale:'pt-BR'});
}

function doGoogleLogin() {
  if(typeof google === 'undefined' || !google.accounts) {
    var n = 0;
    showErr('Carregando Google...');
    var t = setInterval(function(){
      n++;
      if(typeof google !== 'undefined' && google.accounts){ clearInterval(t); doGoogleLogin(); }
      else if(n >= 10){ clearInterval(t); showErr('Não foi possível carregar o Google. Verifique sua conexão.'); }
    }, 500);
    return;
  }
  try {
    google.accounts.id.initialize({ client_id: CLIENT_ID, callback: handleGoogleToken, auto_select: false, ux_mode: 'popup' });
    google.accounts.id.prompt(function(n) {
      if(n.isNotDisplayed() || n.isSkippedMoment()) { abrirPopupGoogle(); }
    });
  } catch(e) { try { abrirPopupGoogle(); } catch(e2) { showErr('Erro: ' + e2.message); } }
}

async function handleGoogleToken(response) {
  setBusy('btn-google', true);
  try {
    var r = await fetch('https://drmecanico-backend-2.onrender.com/api/auth/google', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ credential: response.credential })
    });
    var data = await r.json();
    if(!r.ok) { showErr(data.error || 'Acesso negado.'); return; }
    localStorage.setItem('drm_token', data.token);
    localStorage.setItem('drm_user', JSON.stringify(data.user));
    window.location.replace('/cliente.html');
  } catch(e) {
    showErr('Erro de conexão.');
  } finally {
    setBusy('btn-google', false, '<svg viewBox="0 0 24 24" width="16" height="16"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09V7.07H2.18C1.43 8.55 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg> Continuar com Google');
  }
}


var tok = localStorage.getItem('drm_token');
if(tok) {
  fetch('https://drmecanico-backend-2.onrender.com/api/auth/me', {headers:{'Authorization':'Bearer '+tok}})
    .then(function(r){ return r.json(); })
    .then(function(u){ if(u.email) window.location.replace('/cliente.html'); })
    .catch(function(){});
}





setTimeout(function(){

  var wrap = document.getElementById('wrap');

  wrap.style.visibility = 'visible';
  wrap.classList.add('mostrar');

},1300);


setTimeout(function(){

  document
    .querySelectorAll('.field-over,.btn-abs')
    .forEach(function(el){

      el.style.transition = '0.8s';
      el.style.opacity = '1';

    });

},2500);

</script>
</body>
</html>
