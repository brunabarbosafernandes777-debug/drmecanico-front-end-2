<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="color-scheme" content="light only">
<title>dr Mecânico — Criar Senha</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: #4745F1;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  min-height: 100vh;
  font-family: Arial, Helvetica, sans-serif;
}

.page-wrap {
  width: 100%;
  max-width: 480px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  padding: 48px 24px 48px;
  position: relative;
  background: linear-gradient(160deg, #6260f3 0%, #4745F1 40%, #3533d4 100%);
}

/* Marca alinhada à esquerda */
.marca-svg {
  width: 60%;
  max-width: 220px;
  display: block;
  margin-bottom: 40px;
}

/* Título */
.titulo-tela {
  color: white;
  font-size: clamp(20px, 5.5vw, 26px);
  font-weight: 900;
  margin-bottom: 6px;
  letter-spacing: 0.3px;
}

.subtitulo-tela {
  color: rgba(255,255,255,0.60);
  font-size: clamp(12px, 3vw, 14px);
  margin-bottom: 28px;
}

/* ── Campos ── */
.fields-area {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.field-over {
  background: rgba(71, 69, 241, 0.7);
  border: 1.5px solid rgba(255,255,255,0.35);
  border-radius: 40px;
  display: flex;
  align-items: center;
  padding: 0 20px;
  height: 54px;
  transition: border-color 0.2s, background 0.2s;
}

.field-over:focus-within {
  background: rgba(0, 0, 40, 0.45);
  border-color: rgba(255,255,255,0.75);
}

.field-over input {
  width: 100%;
  background: transparent;
  border: none;
  outline: none;
  color: white;
  font-size: clamp(13px, 3.5vw, 15px);
  font-family: Arial, Helvetica, sans-serif;
}

.field-over input::placeholder {
  color: rgba(255,255,255,0.50);
}

/* ── Botões ── */
.btn-abs {
  border: none;
  border-radius: 40px;
  cursor: pointer;
  font-family: Arial, Helvetica, sans-serif;
  font-weight: 900;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  height: 54px;
  width: 100%;
  font-size: clamp(13px, 3.5vw, 15px);
}

.btn-finalizar {
  background: linear-gradient(135deg, #00AEEF, #0098DA);
  color: white;
}

.btn-reenviar-vis {
  background: transparent;
  border: 1.5px solid rgba(255,255,255,0.35) !important;
  color: rgba(255,255,255,0.80);
  font-size: clamp(12px, 3vw, 14px);
  font-weight: 700;
}

.btn-google {
  background: white;
  color: #333;
  font-size: clamp(12px, 3vw, 14px);
}

.btn-google svg {
  width: 17px;
  height: 17px;
  flex-shrink: 0;
}

.btn-abs:hover { opacity: 0.9; transform: translateY(-1px); }
.btn-abs:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

/* Separador */
.separador {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 12px;
  color: rgba(255,255,255,0.35);
  font-size: 12px;
  margin: 4px 0;
}
.separador::before,
.separador::after {
  content: '';
  flex: 1;
  height: 1px;
  background: rgba(255,255,255,0.2);
}

/* ── Erro ── */
.login-err {
  background: rgba(220, 50, 50, 0.9);
  color: white;
  border-radius: 12px;
  padding: 10px 16px;
  font-size: clamp(11px, 2.8vw, 13px);
  text-align: center;
  display: none;
  width: 100%;
}

/* Spinner */
.spin {
  display: inline-block;
  width: 14px; height: 14px;
  border: 2px solid rgba(255,255,255,0.4);
  border-top-color: white;
  border-radius: 50%;
  animation: sp .7s linear infinite;
}
@keyframes sp { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="page-wrap" id="wrap">

    </g>
  </svg>

  <!-- Título -->
  <div class="titulo-tela" id="titulo-tela">Verifique seu e-mail</div>
  <div class="subtitulo-tela">e defina sua senha para acessar a plataforma</div>

  <!-- Erro -->
  <div class="login-err" id="lerr"></div>

  <!-- Elementos mantidos do JS original (ocultos) -->
  <div id="aviso-verificacao" style="display:none">
    <p><strong>Verifique seu e-mail!</strong></p>
    <p>Um link de ativação foi enviado para o seu e-mail cadastrado.</p>
    <a href="javascript:void(0)" onclick="reenviarEmail()">Não recebeu? Reenviar link.</a>
  </div>
  <a href="mailto:" class="btn-abrir-email" style="display:none">Abrir meu e-mail</a>

  <!-- Campos e botões -->
  <div class="fields-area">
    <div class="field-over" id="field-email">
      <input type="email" id="inp-email" placeholder="seu e-mail" readonly>
    </div>

    <div class="field-over" id="field-senha">
      <input type="password" id="inp-senha" placeholder="crie sua senha">
    </div>

    <div class="field-over" id="field-senha2">
      <input type="password" id="inp-senha2" placeholder="repita sua senha"
             onkeydown="if(event.key==='Enter')finalizarCadastro()">
    </div>

    <button class="btn-abs btn-finalizar" id="btn-finalizar" onclick="finalizarCadastro()">
      Finalizar Cadastro
    </button>

    <!-- Botão reenviar e-mail visível -->
    <button class="btn-abs btn-reenviar-vis" id="btn-reenviar" onclick="reenviarEmail()">
      Reenviar e-mail de confirmação
    </button>

    <div class="separador">ou</div>

    <button class="btn-abs btn-google" id="btn-google" onclick="doGoogleLogin()">
      <svg viewBox="0 0 24 24">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Continuar com Google
    </button>
  </div>

</div>

<script>
var CLIENT_ID = '425197317527-kt5c2j5lk56jqkk7klp188d5rra6gi0q.apps.googleusercontent.com';

var emailCadastro = localStorage.getItem('drm_email_checkout') || '';
document.getElementById('inp-email').value = emailCadastro;

function showErr(msg) {
  var el = document.getElementById('lerr');
  el.textContent = msg; el.style.display = msg ? 'block' : 'none';
  if(msg) setTimeout(function(){ el.style.display='none'; }, 5000);
}

function setBusy(id, busy, label) {
  var btn = document.getElementById(id);
  btn.disabled = busy;
  btn.innerHTML = busy ? '<span class="spin"></span> Aguarde...' : label;
}

async function finalizarCadastro() {
  var email = document.getElementById('inp-email').value.trim();
  var senha = document.getElementById('inp-senha').value;
  var senha2 = document.getElementById('inp-senha2').value;

  if (!email) { showErr('E-mail não encontrado. Volte ao checkout.'); return; }
  if (!senha || senha.length < 6) { showErr('A senha deve ter pelo menos 6 caracteres.'); return; }
  if (senha !== senha2) { showErr('As senhas não coincidem.'); return; }

  setBusy('btn-finalizar', true);

  try {
    const r = await fetch('https://drmecanico-backend-2.onrender.com/api/auth/set-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: email, password: senha })
    });

    const data = await r.json();

    if (r.status === 403) {
      alert('Atenção: Você ainda não verificou seu e-mail. Por favor, acesse o link enviado para sua caixa de entrada.');
      return;
    }

    if (!r.ok) {
      throw new Error(data.error || 'Não foi possível concluir o cadastro.');
    }

    window.location.replace('/cliente.html');

  } catch (e) {
    showErr(e.message);
  } finally {
    setBusy('btn-finalizar', false, 'Finalizar Cadastro');
  }
}

async function reenviarEmail() {
  var email = document.getElementById('inp-email').value.trim();
  try {
    const r = await fetch('https://drmecanico-backend-2.onrender.com/api/auth/reenviar-email', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: email })
    });
    if (r.ok) {
      alert('E-mail enviado! Verifique sua caixa de entrada.');
    } else {
      alert('Erro ao reenviar. Tente novamente mais tarde.');
    }
  } catch (e) {
    alert('Erro de conexão.');
  }
}

window.onload = function() {
  var emailRecuperado =
    localStorage.getItem('drm_email_checkout') ||
    localStorage.getItem('email_pendente');

  if (emailRecuperado) {
    var campoEmail = document.getElementById('inp-email');
    if (campoEmail) {
      campoEmail.value = emailRecuperado;
    }
    console.log("O e-mail do usuário é: " + emailRecuperado);
  }
};

function abrirPopupGoogle() {
  var old = document.getElementById('g-wrap');
  if(old) old.remove();
  var wrap = document.createElement('div');
  wrap.id = 'g-wrap';
  wrap.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:9999;display:flex;align-items:center;justify-content:center';
  wrap.innerHTML = '<div style="background:white;border-radius:16px;padding:24px;text-align:center;min-width:280px"><p style="font-weight:900;color:#4745F1;margin-bottom:16px;font-size:16px">Entrar com Google</p><div id="g-btn-inner"></div><br><button onclick="document.getElementById(\'g-wrap\').remove()" style="width:100%;padding:10px;border:none;background:#f0f0f0;border-radius:8px;cursor:pointer;font-family:Arial;font-size:14px">Cancelar</button></div>';
  document.body.appendChild(wrap);
  google.accounts.id.renderButton(document.getElementById('g-btn-inner'),{theme:'outline',size:'large',width:'240',text:'continue_with',locale:'pt-BR'});
}

function doGoogleLogin() {
  if(typeof google === 'undefined' || !google.accounts) {
    var n = 0;
    showErr('Carregando Google...');
    var t = setInterval(function(){
      n++;
      if(typeof google !== 'undefined' && google.accounts){ clearInterval(t); doGoogleLogin(); }
      else if(n >= 10){ clearInterval(t); showErr('Não foi possível carregar o Google. Verifique sua conexão.'); }
    }, 500);
    return;
  }
  try {
    google.accounts.id.initialize({ client_id: CLIENT_ID, callback: handleGoogleToken, auto_select: false, ux_mode: 'popup' });
    google.accounts.id.prompt(function(n) {
      if(n.isNotDisplayed() || n.isSkippedMoment()) { abrirPopupGoogle(); }
    });
  } catch(e) { try { abrirPopupGoogle(); } catch(e2) { showErr('Erro: ' + e2.message); } }
}

async function handleGoogleToken(response) {
  setBusy('btn-google', true);
  try {
    var r = await fetch('https://drmecanico-backend-2.onrender.com/api/auth/google', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ credential: response.credential })
    });
    var data = await r.json();
    if(!r.ok) { showErr(data.error || 'Acesso negado.'); return; }
    localStorage.setItem('drm_token', data.token);
    localStorage.setItem('drm_user', JSON.stringify(data.user));
    localStorage.removeItem('drm_email_checkout');
    window.location.replace('/cliente.html');
  } catch(e) {
    showErr('Erro de conexão.');
  } finally {
    setBusy('btn-google', false, '<svg viewBox="0 0 24 24" width="16" height="16"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09V7.07H2.18C1.43 8.55 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg> Continuar com Google');
  }
}
</script>
</body>
</html>
