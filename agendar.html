<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="color-scheme" content="light only">
    <meta name="supported-color-schemes" content="light">
    <meta name="theme-color" content="#ffffff">

   
<title>dr Mecânico — Agendar</title>
<link rel="stylesheet" href="estilos.css">
<style>
.bottom.nav{bottom: 
50px !important;
transform:translateY(-2px) !important;

}



.base{
display:block;
position:absolute;
top:0;
  width:400px !important;
  height:110.281px !important;
  left:0;

}




body{

  overflow:hidden !important;
}












</style>
</head>

<body>
  





  </nav>
    
<div class="page">
  <div class="hdr">
    
    <img src="images/marca para parte de cima do app 1.svg" class="base" alt="dr Mecânico">  
</div>

  <div class="cards" id="cards">
  <!-- Sucesso (oculto) -->
  <div class="success" id="success">
    <div class="emj">🎉</div>
    <h2>Agendado!</h2>
    <p id="stxt">Seu agendamento foi confirmado!</p>
    <a class="btn-back" href="/cliente.html">Voltar ao início</a>
  </div>

 

    <!-- CARD 1: Roxo -->
    <div class="card card-1 open" id="c1">

      <div class="card-title">O que acontece com seu carro?</div>
      <div class="card-body" id="body1">
        <div class="white-box">
          <div class="inner-scroll">
          <textarea id="txt" placeholder="Descreva o que está acontecendo no seu carro..."></textarea>
          </div>
          <button class="btn-float btn-float-purple" id="btn1" onclick="analisar()">OK</button>
        </div>
      </div>
    </div>

    <!-- CARD 2: Azul -->
  <div class="card card-2 closed" id="c2">
      <div class="card-title">Acreditamos que seja o seguinte:</div>
      <div class="card-body" id="body2" style="display:none">
        <div class="white-box">
          <div class="inner-scroll">
          <div class="ia-scroll" style="overflow:visible;flex:1;padding:0" id="ia-resp">
            <div class="ia-loading"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
          </div>
          </div>
          <button class="btn-float btn-float-sky" id="btn2" onclick="concordar()" disabled>
            ✅ Estou de acordo
          </button>
        </div>
      </div>
    </div>

    <!-- CARD 3: Laranja -->
    <div class="card card-3 closed" id="c3">
      <div class="card-title">Escolha uma data e horário</div>
      <div class="card-body" id="body3" style="display:none">
        <div class="white-box">
          <div class="inner-scroll">
          <div class="cal-scroll" style="overflow:visible;padding:0">
            <div class="cal-nav">
              <button class="cal-btn" onclick="mesAnterior()">&#8249;</button>
              <div class="cal-month" id="cal-month"></div>
              <button class="cal-btn" onclick="mesProximo()">&#8250;</button>
            </div>
            <div class="cal-grid" id="cal-grid"></div>
            <div class="slots" id="slots"></div>
          </div>
          </div>
          <button class="btn-float btn-float-orange" id="btn3" onclick="confirmar()" disabled>
            📅 Confirmar
          </button>
        </div>
        <div class="orange-bottom-bar"></div>
      </div>
    </div>

  </div>
</div>


<script>
var MECANICO_WPP = '5511940446327';
var tok  = localStorage.getItem('drm_token');
var user = null;
try { user = JSON.parse(localStorage.getItem('drm_user')); } catch(e){}
if(!tok) window.location.href = '/login.html';
console.log('token:', tok);
console.log('user:', user);
var diag = '', dataSel = null, horaSel = null, ocupados = {};
var calData = new Date();

function mostrarSucesso() {
  var s=document.getElementById('success');
  s.style.cssText='display:flex !important;flex-direction:column;align-items:center;justify-content:center;text-align:center;position:fixed;top:0;left:0;right:0;bottom:0;z-index:9999;background:rgba(255,255,255,0.97);padding:40px 24px;';
  document.getElementById('stxt').textContent='Agendamento bem sucedido! Aguarde a mensagem do mecânico no WhatsApp para confirmar seu agendamento.';
}

if(localStorage.getItem('drm_agendado')==='1'){
  localStorage.removeItem('drm_agendado');
  mostrarSucesso();
}

document.addEventListener('visibilitychange', function(){
  if(document.visibilityState==='visible'){
    if(localStorage.getItem('drm_agendado')==='1'){
      localStorage.removeItem('drm_agendado');
      mostrarSucesso();
    }
  }
});

// ── Troca de step ────────────────────────────────────────────
function goStep(n) {
  // Cards: closed = só título, open = expande
  // Step 1: c1 open, c2 e c3 closed abaixo
  // Step 2: c1 closed acima, c2 open, c3 closed abaixo
  // Step 3: c1 e c2 closed acima, c3 open

  var c1=document.getElementById('c1'), c2=document.getElementById('c2'), c3=document.getElementById('c3');
  var b1=document.getElementById('body1'), b2=document.getElementById('body2'), b3=document.getElementById('body3');

  // Reseta tudo
  [c1,c2,c3].forEach(function(c){ c.classList.remove('open','closed'); });

  if(n===1) {
    c1.classList.add('open');  b1.style.display='flex';
    c2.classList.add('closed'); b2.style.display='none';
    c3.classList.add('closed'); b3.style.display='none';
  } else if(n===2) {
    c1.classList.add('closed'); b1.style.display='none';
    c2.classList.add('open');  b2.style.display='flex';
    c3.classList.add('closed'); b3.style.display='none';
  } else if(n===3) {
    c1.classList.add('closed'); b1.style.display='none';
    c2.classList.add('closed'); b2.style.display='none';
    c3.classList.add('open');  b3.style.display='flex';
  }
}

// ── PASSO 1 ──────────────────────────────────────────────────
async function analisar() {
  var prob = document.getElementById('txt').value.trim();
  if(prob.length < 10) { alert('Descreva o problema com mais detalhes.'); return; }

  var btn = document.getElementById('btn1');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span>';

  // Mostra loading na caixa 2 MAS não muda de step ainda
  document.getElementById('ia-resp').innerHTML =
    '<div class="ia-loading"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  document.getElementById('btn2').disabled = true;
console.log('token:', tok);
console.log('problema:', prob);
  try {
    var r = await fetch('https://drmecanico-backend-2.onrender.com/api/ai/chat',{
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + tok },
      body: JSON.stringify({
        messages: [{
          role: 'user',
          content: 'Problema no carro do cliente: ' + prob +
            '. Responda em 3 parágrafos: 1) diagnóstico provável, 2) serviço recomendado, 3) tempo estimado de reparo. Português simples e direto.'
        }]
      })
    });
console.log('status:', r.status);     
    var text = await r.text();
    console.log('resposta:', text); 
    var d = {};
    try { d = JSON.parse(text); } catch(e) {}

    if(!r.ok || d.error) {
      var errMsg = d.error || ('Erro ' + r.status + ': ' + text.substring(0, 100));
      alert('Erro da IA: ' + errMsg);
      btn.disabled = false;
      btn.innerHTML = 'OK';
      return;
    }

    diag = d.reply || '';
    if(!diag) {
      alert('A IA não retornou resposta. Tente novamente.');
      btn.disabled = false;
      btn.innerHTML = 'OK';
      return;
    }

    // Só agora muda pro step 2
    document.getElementById('ia-resp').innerHTML = diag.replace(/\n/g, '<br>');
    document.getElementById('btn2').disabled = false;
    goStep(2);

  } catch(e) {
    alert('Erro de conexão: ' + e.message);
    btn.disabled = false;
    btn.innerHTML = 'OK';
  }
}

// ── PASSO 2 ──────────────────────────────────────────────────
async function concordar() {
  await carregarOcupados();
  renderCal();
  goStep(3);
}

async function carregarOcupados() {
  try {
    var r = await fetch('https://drmecanico-backend-2.onrender.com/api/agendamentos',{headers:{'Authorization':'Bearer '+tok}});
    var ags = await r.json();
    ocupados = {};
    ags.forEach(function(ag){
      if(ag.status!=='cancelado'&&ag.data){
        if(!ocupados[ag.data]) ocupados[ag.data]=[];
        if(ag.hora) ocupados[ag.data].push(ag.hora);
      }
    });
  } catch(e){}
}

// ── Calendário ───────────────────────────────────────────────
var MESES   = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
var DIAS    = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
var HORAS   = ['08:00','09:00','10:00','11:00','14:00','15:00','16:00','17:00'];

function mesAnterior(){ calData.setMonth(calData.getMonth()-1); renderCal(); }
function mesProximo() { calData.setMonth(calData.getMonth()+1); renderCal(); }

function renderCal() {
  var hoje=new Date(); hoje.setHours(0,0,0,0);
  var ano=calData.getFullYear(), mes=calData.getMonth();
  document.getElementById('cal-month').textContent = MESES[mes]+' '+ano;

  var g=document.getElementById('cal-grid'); g.innerHTML='';
  DIAS.forEach(function(d){ var e=document.createElement('div'); e.className='day-name'; e.textContent=d; g.appendChild(e); });

  var prim=new Date(ano,mes,1).getDay(), tot=new Date(ano,mes+1,0).getDate();
  for(var i=0;i<prim;i++) g.appendChild(document.createElement('div'));

  for(var d=1;d<=tot;d++){
    var dt=new Date(ano,mes,d); dt.setHours(0,0,0,0);
    var ds=ano+'-'+String(mes+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    var btn=document.createElement('button');
    btn.className='day'+(dataSel===ds?' selected':'')+(dt.getTime()===hoje.getTime()?' today':'');
    btn.textContent=d;
    if(dt<hoje||dt.getDay()===0||dt.getDay()===6) btn.disabled=true;
    else btn.onclick=(function(s){return function(){dataSel=s;horaSel=null;document.getElementById('btn3').disabled=true;renderCal();renderSlots();};})(ds);
    g.appendChild(btn);
  }
  document.getElementById('slots').innerHTML='';
  if(dataSel) renderSlots();
}

function renderSlots(){
  var ocup=ocupados[dataSel]||[], w=document.getElementById('slots'); w.innerHTML='';
  HORAS.forEach(function(h){
    var isTaken=ocup.indexOf(h)>=0, isSel=horaSel===h;
    var btn=document.createElement('button');
    btn.className='slot'+(isTaken?' taken':'')+(isSel?' selected':'');
    btn.textContent=h;
    if(isTaken) btn.disabled=true;
    else btn.onclick=(function(ho){return function(){horaSel=ho;document.getElementById('btn3').disabled=false;renderSlots();};})(h);
    w.appendChild(btn);
  });
}

// ── PASSO 3 ──────────────────────────────────────────────────
async function confirmar() {
  if(!dataSel||!horaSel){alert('Selecione data e horário.');return;}
  var btn=document.getElementById('btn3');
  btn.disabled=true; btn.innerHTML='<span class="spin"></span> Agendando...';

  var prob=document.getElementById('txt').value.trim();
  var nome=user?user.name:'Cliente';

  try {
    var resp=await fetch('https://drmecanico-backend-2.onrender.com/api/agendamentos',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+tok},
      body:JSON.stringify({tipo:prob.substring(0,60),descricao:prob+'\n\nIA:\n'+diag,data:dataSel,hora:horaSel})
    });
    var result=await resp.json();

    var dataSalva=dataSel, horaSalva=horaSel;
    dataSel=null; horaSel=null; renderCal();

    if(!result.zapiOk){
      localStorage.setItem('drm_agendado','1');
      var msg=encodeURIComponent('🔧 *AGENDAMENTO - dr Mecânico*\n\n👤 '+nome+'\n📅 '+dataSalva+' às '+horaSalva+'\n\n🚗 '+prob+'\n\n🤖 IA:\n'+diag);
      window.location.href='https://wa.me/'+MECANICO_WPP+'?text='+msg;
    } else {
      mostrarSucesso();
    }
  } catch(e){
    alert('Erro ao agendar.'); btn.disabled=false; btn.innerHTML='📅 Confirmar';
  }



}
</script>
</body>
</html>
